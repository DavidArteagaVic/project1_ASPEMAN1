         <section class="hero-carousel" aria-label="Carrusel de imágenes">
                <div class="slides" role="list">
                    <div class="slide" role="listitem">
                        <img src="../FILES/ChatGPT Image 12 jun 2025, 12_29_49.png" alt="Imagen 1 — ejemplo">
                    </div>
                    <div class="slide" role="listitem">
                        <img src="../FILES/clases.png" alt="Imagen 2 — ejemplo">
                    </div>
                    <div class="slide" role="listitem">
                        <img src="../FILES/family.jpg" alt="Imagen 3 — ejemplo">
                    </div>
                </div>

                <button class="carousel-btn prev" aria-label="Anterior">&lsaquo;</button>
                <button class="carousel-btn next" aria-label="Siguiente">&rsaquo;</button>

                <div class="dots" role="tablist" aria-label="Indicadores del carrusel"></div>

                <script>
                    (function () {
                        const script = document.currentScript;
                        const carousel = script.closest('.hero-carousel') || script.parentElement;
                        if (!carousel) return;

                        const slidesEl = carousel.querySelector('.slides');
                        const slides = Array.from(carousel.querySelectorAll('.slide'));
                        const prevBtn = carousel.querySelector('.prev');
                        const nextBtn = carousel.querySelector('.next');
                        const dotsEl = carousel.querySelector('.dots');

                        // Seguridad: salir si falta algo esencial
                        if (!slidesEl || slides.length === 0 || !prevBtn || !nextBtn || !dotsEl) return;

                        let index = 0;
                        let timer = null;
                        const interval = 4000;

                        // Crear indicadores (puntos)
                        slides.forEach((_, i) => {
                            const btn = document.createElement('button');
                            btn.type = 'button';
                            btn.setAttribute('aria-label', `Ir a la diapositiva ${i + 1}`);
                            btn.dataset.index = i;
                            btn.addEventListener('click', () => goTo(i));
                            dotsEl.appendChild(btn);
                        });

                        const dots = Array.from(dotsEl.children);

                        function update() {
                            slidesEl.style.transform = `translateX(${-index * 100}%)`;
                            dots.forEach((d, i) => d.setAttribute('aria-pressed', String(i === index)));
                        }

                        function next() { index = (index + 1) % slides.length; update(); }
                        function prev() { index = (index - 1 + slides.length) % slides.length; update(); }
                        function goTo(i) { index = i % slides.length; update(); }

                        nextBtn.addEventListener('click', () => { next(); resetTimer(); });
                        prevBtn.addEventListener('click', () => { prev(); resetTimer(); });

                        carousel.addEventListener('mouseenter', pause);
                        carousel.addEventListener('focusin', pause);
                        carousel.addEventListener('mouseleave', resume);
                        carousel.addEventListener('focusout', resume);

                        function startTimer() { timer = setInterval(next, interval); }
                        function pause() { clearInterval(timer); timer = null; }
                        function resume() { if (!timer) startTimer(); }
                        function resetTimer() { pause(); resume(); }

                        // Inicializar
                        update();
                        startTimer();

                        window.addEventListener('visibilitychange', () => {
                            if (document.hidden) pause(); else resume();
                        });
                    })();
                </script>

            <script>
                (function () {
                    const reveals = Array.from(document.querySelectorAll('.reveal'));
                    if (!('IntersectionObserver' in window) || reveals.length === 0) {
                        // Fallback: reveal immediately and set counts
                        reveals.forEach(r => r.classList.add('visible'));
                        document.querySelectorAll('.count-value').forEach(el => el.textContent = '+' + el.dataset.target);
                        return;
                    }

                    const observer = new IntersectionObserver((entries, obs) => {
                        entries.forEach(entry => {
                            if (!entry.isIntersecting) return;
                            const el = entry.target;
                            // apply optional delay
                            const delay = parseInt(el.getAttribute('data-delay')) || 0;
                            el.style.transitionDelay = `${delay}ms`;
                            el.classList.add('visible');

                            // if there's a counter inside, animate it once
                            const counter = el.querySelector && el.querySelector('.count-value');
                            if (counter && !counter.dataset.animated) {
                                animateCount(counter, parseInt(counter.dataset.target) || 0);
                                counter.dataset.animated = '1';
                            }

                            // stop observing once revealed
                            obs.unobserve(el);
                        });
                    }, { threshold: 0.18 });

                    reveals.forEach(r => observer.observe(r));

                    function animateCount(el, target) {
                        const duration = 1400;
                        const start = performance.now();
                        function step(now) {
                            const p = Math.min((now - start) / duration, 1);
                            const eased = easeOutCubic(p);
                            const value = Math.floor(eased * target);
                            el.textContent = value;
                            if (p < 1) requestAnimationFrame(step);
                            else el.textContent = target;
                        }
                        // show plus sign by updating sibling if present
                        const plus = el.parentElement && el.parentElement.querySelector('.count-plus');
                        if (plus) {
                            // ensure plus positioned consistently during animation
                        }
                        requestAnimationFrame(step);
                    }

                    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
                })();
            </script>
